<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <style>
      :root { color-scheme: dark; }
      body {
        width: 320px; margin: 0; padding: 14px;
        background: #0b1120; color: #f1f5f9;
        font: 14px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      h1 { margin: 0 0 2px; font-size: 16px; }
      .sub { color: #94a3b8; font-size: 12px; margin-bottom: 12px; }
      .page { font-size: 12px; color: #94a3b8; margin-bottom: 10px; word-break: break-all; }
      textarea {
        width: 100%; box-sizing: border-box; min-height: 64px; resize: vertical;
        background: #131c2e; color: #f1f5f9; border: 1px solid rgba(255,255,255,.14);
        border-radius: 10px; padding: 8px 10px; font: inherit; margin-bottom: 10px;
      }
      button {
        width: 100%; padding: 10px; border: 0; border-radius: 10px; cursor: pointer;
        font: 600 14px inherit; color: #fff; margin-bottom: 8px;
        background: linear-gradient(135deg, #38bdf8, #6366f1);
      }
      button.secondary { background: #1b2740; }
      #status { font-size: 12px; min-height: 16px; }
      a { color: #6390f0; }
    </style>
  </head>
  <body>
    <h1>AlVolo ✈️</h1>
    <div class="sub">Cattura al volo questa pagina o una nota.</div>
    <div class="page" id="page">…</div>
    <textarea id="note" placeholder="Aggiungi una nota (opzionale)…"></textarea>
    <button id="savePage">Salva questa pagina</button>
    <button id="saveNote" class="secondary">Salva solo la nota</button>
    <div id="status"></div>
    <div class="sub" style="margin-top:8px">
      <a href="#" id="openOptions">Impostazioni (endpoint &amp; token)</a>
    </div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
