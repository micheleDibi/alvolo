<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <title>AlVolo — Impostazioni</title>
    <style>
      :root { color-scheme: dark; }
      body {
        max-width: 420px; margin: 40px auto; padding: 0 16px;
        background: #0b1120; color: #f1f5f9;
        font: 15px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      h1 { font-size: 20px; }
      label { display: block; font-size: 13px; color: #94a3b8; margin: 14px 0 6px; }
      input {
        width: 100%; box-sizing: border-box; padding: 10px 12px; font: inherit;
        background: #131c2e; color: #f1f5f9; border: 1px solid rgba(255,255,255,.14);
        border-radius: 10px;
      }
      button {
        margin-top: 18px; padding: 10px 18px; border: 0; border-radius: 10px; cursor: pointer;
        font: 600 15px inherit; color: #fff; background: linear-gradient(135deg, #38bdf8, #6366f1);
      }
      #status { margin-top: 12px; font-size: 13px; color: #34d399; min-height: 18px; }
      .hint { font-size: 12px; color: #64748b; margin-top: 6px; }
    </style>
  </head>
  <body>
    <h1>AlVolo ✈️ — Impostazioni</h1>
    <label for="endpoint">Endpoint del server</label>
    <input id="endpoint" type="url" placeholder="https://alvolo.tuodominio.com" />
    <div class="hint">L'URL base della tua istanza AlVolo (senza /api).</div>
    <label for="token">Token di accesso (CAPTURE_TOKEN)</label>
    <input id="token" type="password" placeholder="incolla il token…" />
    <div class="hint">Salvato solo nel profilo di questo browser.</div>
    <button id="save">Salva</button>
    <div id="status"></div>
    <script type="module" src="options.js"></script>
  </body>
</html>
