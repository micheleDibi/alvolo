# Self-hosting on a VPS: `docker compose up -d --build`
#
# - Builds the image from the Dockerfile (frontend + backend in one container).
# - Persists the SQLite DB and uploaded images in the named volume `alvolo_data` (/data).
# - Reads secrets from a local `.env` file (copy from .env.example, set ANTHROPIC_API_KEY
#   and CAPTURE_TOKEN).
# - Publishes ONLY on 127.0.0.1:8000 — put a reverse proxy (Caddy/nginx) in front for
#   public HTTPS (required by the PWA and the iOS Shortcut). See README "Deploy sul VPS".

services:
  app:
    build: .
    image: alvolo:latest
    restart: unless-stopped
    env_file: .env
    environment:
      DATA_DIR: /data
    volumes:
      - alvolo_data:/data
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  alvolo_data:
